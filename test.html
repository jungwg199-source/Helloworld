<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그림자 교실 탈출</title>
  <style>
    :root {
      --bg: #070812;
      --panel: rgba(18, 22, 39, 0.88);
      --panel-light: rgba(34, 40, 68, 0.92);
      --text: #f3f5ff;
      --muted: #aeb6d9;
      --accent: #9f7aea;
      --accent-2: #5eead4;
      --danger: #fb7185;
      --success: #86efac;
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(159, 122, 234, 0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(94, 234, 212, 0.12), transparent 28%),
        linear-gradient(135deg, #05060f 0%, #111827 45%, #060711 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle, black 45%, transparent 78%);
      animation: drift 12s linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(44px); }
    }

    .game-wrap {
      width: min(940px, calc(100% - 32px));
      min-height: 620px;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      box-shadow: 0 28px 90px var(--shadow);
      padding: 28px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .game-wrap::after {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      right: -120px;
      top: -120px;
      border-radius: 999px;
      background: rgba(159, 122, 234, 0.18);
      filter: blur(18px);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      position: relative;
      z-index: 2;
      margin-bottom: 22px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .timer {
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 800;
      color: var(--accent-2);
      letter-spacing: 0.5px;
    }

    .scene {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 22px;
      align-items: stretch;
    }

    .story-card, .puzzle-card {
      background: var(--panel-light);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.03;
      letter-spacing: -1.8px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: clamp(25px, 4vw, 38px);
      line-height: 1.14;
    }

    p {
      color: var(--muted);
      line-height: 1.72;
      font-size: 18px;
      margin: 0 0 16px;
      word-break: keep-all;
    }

    .big-icon {
      font-size: clamp(68px, 12vw, 130px);
      text-align: center;
      margin: 10px 0 18px;
      filter: drop-shadow(0 0 28px rgba(159, 122, 234, 0.45));
      animation: floaty 3.2s ease-in-out infinite;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .choices {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 17px;
      font-weight: 800;
      color: #101322;
      background: linear-gradient(135deg, var(--accent-2), #c4b5fd);
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(94, 234, 212, 0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(159, 122, 234, 0.26);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: none;
    }

    button.danger {
      background: linear-gradient(135deg, #fb7185, #fda4af);
      color: #230811;
    }

    .puzzle-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 420px;
    }

    .puzzle-title {
      color: var(--accent-2);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 1.6px;
      margin-bottom: 12px;
    }

    .question {
      font-size: clamp(42px, 8vw, 76px);
      font-weight: 900;
      text-align: center;
      margin: 18px 0;
      color: #fff;
      text-shadow: 0 0 28px rgba(94, 234, 212, 0.25);
    }

    .countdown {
      height: 16px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
      margin: 14px 0 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .countdown-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      transition: width 0.1s linear;
    }

    input {
      width: 100%;
      padding: 18px 20px;
      border-radius: 18px;
      border: 2px solid rgba(255, 255, 255, 0.16);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      outline: none;
    }

    input:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 5px rgba(94, 234, 212, 0.12);
    }

    .helper {
      font-size: 15px;
      color: var(--muted);
      text-align: center;
      margin-top: 12px;
    }

    .message {
      min-height: 28px;
      color: var(--danger);
      font-weight: 800;
      text-align: center;
      margin-top: 12px;
      word-break: keep-all;
    }

    .ending {
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 500px;
    }

    .clear-time {
      font-size: clamp(58px, 12vw, 130px);
      font-weight: 1000;
      color: var(--success);
      line-height: 1;
      margin: 20px 0 12px;
      text-shadow: 0 0 40px rgba(134, 239, 172, 0.3);
    }

    .rank-note {
      display: inline-block;
      margin: 16px auto 0;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(134, 239, 172, 0.12);
      border: 1px solid rgba(134, 239, 172, 0.25);
      color: #d9ffe4;
      font-weight: 800;
    }

    .shake {
      animation: shake 0.45s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-7px); }
      80% { transform: translateX(7px); }
    }

    .fade-in {
      animation: fadeIn 0.35s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .small-setting {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .small-setting label {
      color: var(--muted);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.07);
      padding: 8px 10px;
      border-radius: 999px;
    }

    .small-setting select {
      background: rgba(0, 0, 0, 0.32);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      padding: 6px 8px;
    }

    @media (max-width: 760px) {
      .game-wrap {
        padding: 18px;
        min-height: auto;
      }

      .top-bar {
        flex-direction: column;
        align-items: flex-start;
      }

      .scene {
        grid-template-columns: 1fr;
      }

      .story-card, .puzzle-card {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="game-wrap" id="gameWrap">
    <div class="top-bar">
      <div class="badge" id="stageBadge">🌙 그림자 교실 탈출</div>
      <div class="timer" id="totalTimer">00:00.0</div>
    </div>

    <section id="game"></section>
  </main>

  <script>
    const scenes = [
      {
        title: "꺼진 교실의 불빛",
        icon: "🏫",
        story: [
          "방과 후, 교실에 혼자 남은 순간 복도 끝 시계가 거꾸로 움직이기 시작했습니다.",
          "칠판에는 하얀 분필 글씨가 천천히 나타납니다. ‘정답을 말해야 문이 열린다.’"
        ],
        puzzleIntro: "칠판의 첫 번째 속삭임"
      },
      {
        title: "잠긴 사물함",
        icon: "🔐",
        story: [
          "교실 문은 살짝 열렸지만, 복도로 나가는 열쇠는 낡은 사물함 안에 있습니다.",
          "사물함 손잡이에서 차가운 빛이 나더니 또 하나의 문제가 떠오릅니다."
        ],
        puzzleIntro: "사물함 비밀번호"
      },
      {
        title: "책상 밑의 작은 종",
        icon: "🔔",
        story: [
          "열쇠를 꺼내려는 순간, 책상 밑에서 작은 종소리가 울립니다. 딸랑, 딸랑.",
          "종에는 글자가 새겨져 있습니다. ‘서두르지 않으면 처음으로 돌아간다.’"
        ],
        puzzleIntro: "종소리를 멈추는 계산"
      },
      {
        title: "복도 끝 그림자",
        icon: "👣",
        story: [
          "복도로 나서자 발자국 소리가 한 박자 늦게 따라옵니다. 돌아보면 아무도 없습니다.",
          "복도 끝 비상구 위에 마지막 숫자 문제가 깜빡입니다."
        ],
        puzzleIntro: "비상구의 마지막 암호"
      },
      {
        title: "새벽빛이 들어오는 문",
        icon: "🚪",
        story: [
          "마지막 문 앞입니다. 창문 너머로 희미한 새벽빛이 들어옵니다.",
          "문고리가 따뜻해졌습니다. 마지막 구구단을 맞히면 그림자 교실을 빠져나갈 수 있습니다."
        ],
        puzzleIntro: "탈출을 여는 한 문제"
      }
    ];

    const spookyMessages = [
      "교실 불이 하나씩 꺼집니다... 처음부터 다시 시작하세요.",
      "칠판 지우개가 혼자 움직였습니다... 처음 장면으로 돌아갑니다.",
      "복도에서 누군가 이름을 부르는 것 같습니다... 다시 시작하세요.",
      "시계가 거꾸로 한 바퀴 돌았습니다... 처음으로 돌아갑니다.",
      "사물함 안쪽에서 작은 노크 소리가 들립니다... 다시 도전하세요."
    ];

    const game = document.getElementById("game");
    const gameWrap = document.getElementById("gameWrap");
    const totalTimer = document.getElementById("totalTimer");
    const stageBadge = document.getElementById("stageBadge");

    let currentScene = 0;
    let currentAnswer = 0;
    let gameStarted = false;
    let startTime = 0;
    let totalTimerId = null;
    let puzzleTimerId = null;
    let puzzleStart = 0;
    let puzzleLimit = 10000;
    let selectedLimit = 10;
    let selectedMaxDan = 9;

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      const tenths = Math.floor((ms % 1000) / 100);
      return `${pad(minutes)}:${pad(seconds)}.${tenths}`;
    }

    function startTotalTimer() {
      stopTotalTimer();
      startTime = performance.now();
      totalTimerId = setInterval(() => {
        totalTimer.textContent = formatTime(performance.now() - startTime);
      }, 80);
    }

    function stopTotalTimer() {
      if (totalTimerId) clearInterval(totalTimerId);
      totalTimerId = null;
    }

    function stopPuzzleTimer() {
      if (puzzleTimerId) clearInterval(puzzleTimerId);
      puzzleTimerId = null;
    }

    function setStageBadge(text) {
      stageBadge.textContent = text;
    }

    function renderStart() {
      stopPuzzleTimer();
      stopTotalTimer();
      currentScene = 0;
      gameStarted = false;
      totalTimer.textContent = "00:00.0";
      setStageBadge("🌙 그림자 교실 탈출");

      game.innerHTML = `
        <div class="scene fade-in">
          <div class="story-card">
            <h1>그림자 교실 탈출</h1>
            <p>으스스하지만 무섭게 잔인하지 않은 초등학생용 방탈출 게임입니다.</p>
            <p>스토리를 따라가며 제한 시간 안에 구구단 문제를 풀어 보세요. 틀리거나 시간이 지나면 처음 장면으로 돌아갑니다.</p>
            <div class="small-setting">
              <label>
                문제 제한 시간
                <select id="limitSelect">
                  <option value="7">7초</option>
                  <option value="10" selected>10초</option>
                  <option value="15">15초</option>
                  <option value="20">20초</option>
                </select>
              </label>
              <label>
                구구단 범위
                <select id="danSelect">
                  <option value="5">2~5단</option>
                  <option value="9" selected>2~9단</option>
                </select>
              </label>
            </div>
            <div class="choices">
              <button onclick="startGame()">탈출 시작하기</button>
            </div>
          </div>
          <div class="puzzle-card">
            <div class="big-icon">🕯️</div>
            <p style="text-align:center;">칠판 위 촛불이 흔들립니다.<br />문을 열 암호는 모두 구구단 속에 숨어 있습니다.</p>
          </div>
        </div>
      `;
    }

    function startGame() {
      selectedLimit = Number(document.getElementById("limitSelect").value);
      selectedMaxDan = Number(document.getElementById("danSelect").value);
      puzzleLimit = selectedLimit * 1000;
      currentScene = 0;
      gameStarted = true;
      startTotalTimer();
      renderScene();
    }

    function renderScene() {
      stopPuzzleTimer();
      const scene = scenes[currentScene];
      setStageBadge(`장면 ${currentScene + 1} / ${scenes.length}`);

      game.innerHTML = `
        <div class="scene fade-in">
          <div class="story-card">
            <h2>${scene.title}</h2>
            ${scene.story.map(line => `<p>${line}</p>`).join("")}
            <div class="choices">
              <button onclick="renderPuzzle()">암호 확인하기</button>
            </div>
          </div>
          <div class="puzzle-card">
            <div class="big-icon">${scene.icon}</div>
            <p style="text-align:center;">천천히 숨을 고르고, 다음 문으로 가는 암호를 풀어 보세요.</p>
          </div>
        </div>
      `;
    }

    function makeQuestion() {
      const a = Math.floor(Math.random() * (selectedMaxDan - 1)) + 2;
      const b = Math.floor(Math.random() * 8) + 2;
      currentAnswer = a * b;
      return `${a} × ${b}`;
    }

    function renderPuzzle() {
      const scene = scenes[currentScene];
      const question = makeQuestion();

      game.innerHTML = `
        <div class="scene fade-in">
          <div class="story-card">
            <h2>${scene.title}</h2>
            <p>${scene.puzzleIntro}</p>
            <p>제한 시간 안에 답을 입력하고 확인을 누르세요. 엔터 키로도 제출할 수 있습니다.</p>
            <p>남은 시간이 줄어들수록 교실의 그림자가 가까워집니다.</p>
          </div>
          <div class="puzzle-card">
            <div class="puzzle-title">MULTIPLICATION LOCK</div>
            <div class="question">${question}</div>
            <div class="countdown" aria-label="남은 시간">
              <div class="countdown-fill" id="countdownFill"></div>
            </div>
            <input id="answerInput" inputmode="numeric" type="number" placeholder="정답" autocomplete="off" />
            <div class="choices">
              <button onclick="checkAnswer()">정답 제출</button>
            </div>
            <div class="helper">제한 시간: ${selectedLimit}초</div>
            <div class="message" id="message"></div>
          </div>
        </div>
      `;

      const input = document.getElementById("answerInput");
      input.focus();
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") checkAnswer();
      });

      startPuzzleTimer();
    }

    function startPuzzleTimer() {
      stopPuzzleTimer();
      puzzleStart = performance.now();
      const fill = document.getElementById("countdownFill");

      puzzleTimerId = setInterval(() => {
        const elapsed = performance.now() - puzzleStart;
        const remaining = Math.max(0, puzzleLimit - elapsed);
        const percent = (remaining / puzzleLimit) * 100;
        if (fill) fill.style.width = `${percent}%`;

        if (remaining <= 0) {
          failAndReset("시간이 다 되었습니다.");
        }
      }, 60);
    }

    function checkAnswer() {
      const input = document.getElementById("answerInput");
      const value = Number(input.value);

      if (!input.value.trim()) {
        showMessage("답을 입력해야 문이 반응합니다.");
        return;
      }

      if (value === currentAnswer) {
        stopPuzzleTimer();
        currentScene += 1;
        if (currentScene >= scenes.length) {
          renderClear();
        } else {
          renderCorrectTransition();
        }
      } else {
        failAndReset("정답이 아닙니다.");
      }
    }

    function showMessage(text) {
      const message = document.getElementById("message");
      if (message) message.textContent = text;
    }

    function failAndReset(reason) {
      stopPuzzleTimer();
      gameWrap.classList.remove("shake");
      void gameWrap.offsetWidth;
      gameWrap.classList.add("shake");

      const spooky = spookyMessages[Math.floor(Math.random() * spookyMessages.length)];
      setStageBadge("처음으로 돌아갑니다");

      game.innerHTML = `
        <div class="ending fade-in">
          <div class="big-icon">🌫️</div>
          <h2>${reason}</h2>
          <p>${spooky}</p>
          <div class="choices" style="max-width: 360px; margin: 20px auto 0; width: 100%;">
            <button class="danger" onclick="renderStart()">처음 장면으로 돌아가기</button>
          </div>
        </div>
      `;

      setTimeout(() => {
        renderStart();
      }, 3200);
    }

    function renderCorrectTransition() {
      setStageBadge(`장면 ${currentScene + 1}로 이동 중`);
      game.innerHTML = `
        <div class="ending fade-in">
          <div class="big-icon">✨</div>
          <h2>문이 조용히 열렸습니다.</h2>
          <p>하지만 아직 교실의 그림자는 완전히 사라지지 않았습니다.</p>
          <div class="choices" style="max-width: 360px; margin: 20px auto 0; width: 100%;">
            <button onclick="renderScene()">다음 장면으로</button>
          </div>
        </div>
      `;
    }

    function renderClear() {
      stopPuzzleTimer();
      stopTotalTimer();
      const clearMs = performance.now() - startTime;
      const clearText = formatTime(clearMs);
      setStageBadge("탈출 성공");
      totalTimer.textContent = clearText;

      game.innerHTML = `
        <div class="ending fade-in">
          <div class="big-icon">🌅</div>
          <h2>탈출 성공!</h2>
          <p>문이 열리고, 교실 안의 그림자가 햇빛 속으로 조용히 사라졌습니다.</p>
          <div class="clear-time">${clearText}</div>
          <div class="rank-note">이 시간을 기록하고 친구들과 비교해 보세요!</div>
          <div class="choices" style="max-width: 360px; margin: 26px auto 0; width: 100%;">
