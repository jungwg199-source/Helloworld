<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 첫 바이브 코딩</title>
    <style>
        /* 배경 및 전체 레이아웃 디자인 (CSS) */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        /* 가운데 카드 디자인 */
        .card {
            background-color: white;
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        h1 {
            color: #4a5568;
            margin-bottom: 20px;
        }
        /* 파스텔톤 버튼 디자인 */
        button {
            background-color: #a3bffa;
            color: #2d3748;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #7f9cf5;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="message">Hello World!</h1>
        <button onclick="changeMessage()">클릭해보세요</button>
    </div>

    <script>
        /* 버튼을 누르면 작동하는 기능 (JavaScript) */
        function changeMessage() {
            const messageElement = document.getElementById('message');
            if (messageElement.innerText === 'Hello World!') {
                messageElement.innerText = '반가워요! 첫 웹사이트 성공 완료! 🎉';
            } else {
                messageElement.innerText = 'Hello World!';
            }
        }
    </script>

</body>
</html>
