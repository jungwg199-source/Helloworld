<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그림자 교실 탈출: 구구단 20문제 승부</title>
  <style>
    :root {
      --panel: rgba(18, 22, 39, 0.9);
      --panel-light: rgba(34, 40, 68, 0.93);
      --text: #f3f5ff;
      --muted: #aeb6d9;
      --accent: #9f7aea;
      --accent-2: #5eead4;
      --danger: #fb7185;
      --success: #86efac;
      --warning: #fde68a;
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(159, 122, 234, 0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(94, 234, 212, 0.12), transparent 28%),
        linear-gradient(135deg, #05060f 0%, #111827 45%, #060711 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle, black 45%, transparent 78%);
      animation: drift 12s linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(44px); }
    }

    .game-wrap {
      width: min(1020px, calc(100% - 32px));
      min-height: 650px;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      box-shadow: 0 28px 90px var(--shadow);
      padding: 28px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .game-wrap::after {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      right: -120px;
      top: -120px;
      border-radius: 999px;
      background: rgba(159, 122, 234, 0.18);
      filter: blur(18px);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      position: relative;
      z-index: 2;
      margin-bottom: 22px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      word-break: keep-all;
    }

    .timer {
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 900;
      color: var(--accent-2);
      letter-spacing: 0.5px;
    }

    .scene {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      align-items: stretch;
    }

    .story-card, .puzzle-card {
      background: var(--panel-light);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1.05;
      letter-spacing: -1.8px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: clamp(25px, 4vw, 38px);
      line-height: 1.14;
    }

    p {
      color: var(--muted);
      line-height: 1.72;
      font-size: 18px;
      margin: 0 0 16px;
      word-break: keep-all;
    }

    .big-icon {
      font-size: clamp(68px, 12vw, 120px);
      text-align: center;
      margin: 10px 0 18px;
      filter: drop-shadow(0 0 28px rgba(159, 122, 234, 0.45));
      animation: floaty 3.2s ease-in-out infinite;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .choices {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 17px;
      font-weight: 900;
      color: #101322;
      background: linear-gradient(135deg, var(--accent-2), #c4b5fd);
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(94, 234, 212, 0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      word-break: keep-all;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(159, 122, 234, 0.26);
    }

    button.choice-btn {
      color: var(--text);
      background: rgba(255, 255, 255, 0.085);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: none;
      text-align: left;
      font-size: clamp(22px, 4vw, 34px);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    button.choice-btn:hover {
      background: rgba(94, 234, 212, 0.12);
      border-color: rgba(94, 234, 212, 0.35);
    }

    button.danger {
      background: linear-gradient(135deg, #fb7185, #fda4af);
      color: #230811;
    }

    .puzzle-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 450px;
    }

    .puzzle-title {
      color: var(--accent-2);
      font-size: 16px;
      font-weight: 1000;
      letter-spacing: 1.6px;
      margin-bottom: 12px;
    }

    .question-box {
      padding: 18px;
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.12);
      margin: 12px 0 16px;
      text-align: center;
    }

    .question {
      font-size: clamp(48px, 9vw, 86px);
      font-weight: 1000;
      color: #fff;
      text-shadow: 0 0 28px rgba(94, 234, 212, 0.22);
      line-height: 1.1;
    }

    .problem-type {
      color: var(--warning);
      font-weight: 900;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .countdown {
      height: 16px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
      margin: 14px 0 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .countdown-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      transition: width 0.1s linear;
    }

    .helper {
      font-size: 15px;
      color: var(--muted);
      text-align: center;
      margin-top: 12px;
    }

    .progress-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 18px 0 2px;
    }

    .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .dot.done { background: var(--accent-2); }
    .dot.now { background: var(--warning); box-shadow: 0 0 16px rgba(253, 230, 138, 0.35); }

    .ending {
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 520px;
      position: relative;
      z-index: 2;
    }

    .clear-time {
      font-size: clamp(58px, 12vw, 130px);
      font-weight: 1000;
      color: var(--success);
      line-height: 1;
      margin: 20px 0 12px;
      text-shadow: 0 0 40px rgba(134, 239, 172, 0.3);
    }

    .rank-note {
      display: inline-block;
      margin: 16px auto 0;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(134, 239, 172, 0.12);
      border: 1px solid rgba(134, 239, 172, 0.25);
      color: #d9ffe4;
      font-weight: 900;
      word-break: keep-all;
    }

    .shake { animation: shake 0.45s ease-in-out; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-7px); }
      80% { transform: translateX(7px); }
    }

    .fade-in { animation: fadeIn 0.35s ease both; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .small-setting {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .small-setting label {
      color: var(--muted);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.07);
      padding: 8px 10px;
      border-radius: 999px;
    }

    .small-setting select {
      background: rgba(0, 0, 0, 0.32);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      padding: 6px 8px;
    }

    @media (max-width: 820px) {
      .game-wrap { padding: 18px; min-height: auto; }
      .top-bar { flex-direction: column; align-items: flex-start; }
      .scene { grid-template-columns: 1fr; }
      .story-card, .puzzle-card { padding: 22px; }
      button.choice-btn { font-size: 24px; }
    }
  </style>
</head>

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function choiceLabel(index) {
      return ["①", "②", "③", "④"][index];
    }

    function makeGugudanDistractors(answer) {
      const candidates = [
        answer + 1, answer - 1,
        answer + 2, answer - 2,
        answer + 9, answer - 9,
        answer + 10, answer - 10
      ];

      const unique = [];
      const keys = new Set([String(answer)]);

      for (const c of candidates) {
        if (c <= 0) continue;
        const key = String(c);
        if (!keys.has(key)) {
          keys.add(key);
          unique.push(c);
        }
        if (unique.length >= 3) break;
      }

      while (unique.length < 3) {
        const c = randomInt(2, selectedMaxDan) * randomInt(2, 9);
        const key = String(c);
        if (!keys.has(key)) {
          keys.add(key);
          unique.push(c);
        }
      }

      return unique;
    }

    function pad(num) {

      const totalSeconds = Math.floor(ms / 1000);

      return `${pad(minutes)}:${pad(seconds)}.${tenths}`;
